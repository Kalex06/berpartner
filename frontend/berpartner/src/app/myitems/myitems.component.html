<main class="item-container">
    <button class="back-btn" routerLink="/home" (click)="navigateBack()" aria-label="Vissza a főoldalra">
        <mat-icon>home</mat-icon>
    </button>

    <h2>Az általad kínált termékek:</h2>

    <div class="ad-grid">
        @for(post of posts; track post.id){
        <article>
            <mat-card class="item-card" appearance="outlined">
                <img mat-card-image src="http://localhost:3000/upload/picture/{{post.kep_nev}}" alt="Termék kép" class="item-image">
                <mat-card-header>
                    <mat-card-title>{{post.nev}}</mat-card-title>
                    <mat-card-subtitle>{{post.kategoria}}</mat-card-subtitle>
                </mat-card-header>
                <mat-card-content>
                    <p>{{post.leiras}}</p>
                    <div class="item-informations">
                        <div class="price-tag">{{post.ar_egy_napra}} Ft / nap</div>
                        <div class="location-tag">
                            <mat-icon class="location-icon">place</mat-icon>
                            <span>{{post.varos}}</span>
                        </div>
                    </div>
                </mat-card-content>
                <mat-card-actions>
                    <button mat-button><mat-icon color="warn">delete</mat-icon></button>
                    <button mat-button><mat-icon>edit</mat-icon></button>
                </mat-card-actions>
            </mat-card>
        </article>
        } @empty {
        <p style="color: aliceblue; grid-column: span 4; text-align: center; margin-top: 40px;">
            Nincs megjeleníthető hirdetésed!
        </p>
        }
    </div>

</main>
